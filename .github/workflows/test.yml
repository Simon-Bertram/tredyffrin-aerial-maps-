name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SERVER_URL: http://127.0.0.1:3000
      CORS_ORIGIN: http://127.0.0.1:4321
      PUBLIC_SANITY_PROJECT_ID: test-project
      PUBLIC_SANITY_DATASET: test
      PUBLIC_SANITY_API_VERSION: '2026-04-16'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Setup Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Ensure Drizzle migrations exist
        run: pnpm db:generate

      - name: Run tests through Turborepo
        run: pnpm test
